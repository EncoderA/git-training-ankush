<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact page for the Git Training assignment.">
    <title>Git Training | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <div class="logo">GitFlow Demo</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-hero">
            <h1>Contact</h1>
            <p>Use this form as a simple example page for the branching and pull request workflow.</p>
        </section>

        <section class="content-section">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message"></textarea>
                </div>
                <button class="btn-submit" type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Git Training Project.</p>
    </footer>
</body>
</html>
